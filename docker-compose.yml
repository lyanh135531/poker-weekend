services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: poker-server
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=7777
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - poker-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: poker-client
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_SERVER_URL=
    depends_on:
      - server
    networks:
      - poker-network

  nginx:
    image: nginx:alpine
    container_name: poker-nginx
    ports:
      - "7778:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - poker-network

  redis:
    image: redis:alpine
    container_name: poker-redis
    networks:
      - poker-network

networks:
  poker-network:
    driver: bridge
