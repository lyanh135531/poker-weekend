services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: poker-server
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "7777:7777"
    environment:
      - NODE_ENV=development
      - PORT=7777
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - poker-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: poker-client
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "7778:7778"
    environment:
      - VITE_SERVER_URL=http://localhost:7777
    depends_on:
      - server
    networks:
      - poker-network

  redis:
    image: redis:alpine
    container_name: poker-redis
    ports:
      - "6379:6379"
    networks:
      - poker-network

networks:
  poker-network:
    driver: bridge
